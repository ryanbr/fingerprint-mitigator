<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fingerprint Mitigator — Settings</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --panel: #16213e;
      --border: #0f3460;
      --text: #e0e0e0;
      --text-dim: #b0bec5;
      --text-faint: #78909c;
      --accent: #43a047;
      --high: #ef5350;
      --shadow: #00000066;
    }
    body.light {
      --bg: #f5f5f8;
      --panel: #ffffff;
      --border: #b0b8c4;
      --text: #1a1a2e;
      --text-dim: #3a4254;
      --text-faint: #6a7488;
      --accent: #2e7d32;
      --high: #d32f2f;
      --shadow: #00000033;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      max-width: 880px;
      margin: 0 auto;
      padding: 24px 24px 48px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 22px;
      color: var(--accent);
      flex: 1;
    }
    .subtitle {
      color: var(--text-faint);
      margin-bottom: 24px;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      align-items: center;
    }
    .actions button {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--panel);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
    }
    .actions button:hover { background: var(--border); }
    .actions button.danger {
      border-color: var(--high);
      color: var(--high);
    }
    .actions button.danger:hover { background: var(--high); color: #fff; }
    .stat {
      color: var(--text-faint);
      margin-left: auto;
      font-size: 13px;
    }

    .site-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .site-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .site-domain {
      flex: 1;
      font-family: Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 14px;
      color: var(--accent);
    }
    .site-disabled-badge {
      padding: 3px 8px;
      border-radius: 10px;
      background: var(--high);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
    }
    .site-actions button {
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
    }
    .site-actions button:hover {
      background: var(--high);
      color: #fff;
      border-color: var(--high);
    }

    .overrides {
      padding: 8px 16px 12px;
    }
    .override {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 4px 0;
      font-size: 13px;
    }
    .override .key {
      font-family: Consolas, "Liberation Mono", Menlo, monospace;
      color: var(--text-dim);
      min-width: 240px;
    }
    .override .value {
      color: var(--text);
      font-family: Consolas, "Liberation Mono", Menlo, monospace;
    }
    .override .tag {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      font-weight: 700;
    }
    .tag.disabled  { background: var(--high); color: #fff; }
    .tag.subcheck  { background: #fb8c00; color: #fff; }
    .tag.value     { background: #1e88e5; color: #fff; }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-faint);
    }
    .empty p { margin: 8px 0; }
    .empty svg { opacity: 0.4; }

    footer {
      margin-top: 32px;
      text-align: center;
      font-size: 12px;
      color: var(--text-faint);
    }
  </style>
</head>
<body>
  <header>
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round">
      <path d="M 3 11 Q 3 8 6 8 L 9 8 Q 10.5 8 11.5 9.5 L 12 10 L 12.5 9.5 Q 13.5 8 15 8 L 18 8 Q 21 8 21 11 L 21 13 Q 21 16 18 16 L 16 16 Q 13 16 12.5 14.5 L 12 14 L 11.5 14.5 Q 11 16 8 16 L 6 16 Q 3 16 3 13 Z"/>
      <circle cx="7.5" cy="12" r="1" fill="currentColor" stroke="none"/>
      <circle cx="16.5" cy="12" r="1" fill="currentColor" stroke="none"/>
    </svg>
    <h1>Fingerprint Mitigator — Settings</h1>
  </header>

  <p class="subtitle">Every site with a non-default configuration. Each card lists the overrides applied.</p>

  <div class="actions">
    <button id="export" type="button">Export as JSON</button>
    <button id="reset-all" type="button" class="danger">Reset everything</button>
    <span class="stat" id="stat">0 sites configured</span>
  </div>

  <div id="sites"></div>

  <div id="empty-state" class="empty" style="display:none">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"/>
      <path d="M8 15s1.5 2 4 2 4-2 4-2"/>
      <line x1="9" y1="9" x2="9.01" y2="9"/>
      <line x1="15" y1="9" x2="15.01" y2="9"/>
    </svg>
    <p>No site-specific configuration yet.</p>
    <p style="font-size:12px">All sites get the default Chrome-masking behavior. Open the extension popup on any site to tweak it.</p>
  </div>

  <footer id="footer">Fingerprint Mitigator</footer>

  <script src="changes.js"></script>
</body>
</html>
